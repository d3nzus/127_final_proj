<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UPCart API Tester</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    label { display: block; margin-top: 1rem; }
    textarea { width: 100%; height: 120px; }
    pre { background: #f4f4f4; padding: 1rem; border: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>UPCart API Tester</h1>

  <form id="apiForm">
    <label>
      Endpoint (relative to /api):
      <input type="text" id="endpoint" value="listings" />
    </label>

    <label>
      Method:
      <select id="method">
        <option>GET</option>
        <option>POST</option>
        <option>PUT</option>
        <option>DELETE</option>
      </select>
    </label>

    <label>
      Request Body (JSON):
      <textarea id="body">{}</textarea>
    </label>

    <button type="submit">Send Request</button>
  </form>

  <h2>Response</h2>
  <pre id="response"></pre>

  <script>
    document.getElementById("apiForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const endpoint = document.getElementById("endpoint").value;
      const method = document.getElementById("method").value;
      const bodyText = document.getElementById("body").value.trim();

      let options = { method, headers: { "Content-Type": "application/json" } };
      if (method !== "GET" && bodyText) {
        options.body = bodyText;
      }

      try {
        const res = await fetch("/127_final_proj/src/backend/index.php/api/" + endpoint, options);
        const data = await res.json();
        document.getElementById("response").textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById("response").textContent = "Error: " + err;
      }
    });
  </script>
</body>
</html>
